<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Multiples</title>
    <script>
        // Function to return the sum of multiples of a or b in the array l
        function f4(a, b, l) {
            let sum = 0;
            for (let i = 0; i < l.length; i++) {
                if (l[i] % a === 0 || l[i] % b === 0) {
                    sum += l[i];
                }
            }
            return sum;
        }

        // Function triggered on button click
        function onButtonClick() {
            const a = parseInt(document.getElementById("a").value);
            const b = parseInt(document.getElementById("b").value);
            const l = document.getElementById("l").value.split(',').map(Number); // Converts input into an array of numbers

            const result = f4(a, b, l);
            alert("The sum of multiples of " + a + " or " + b + " in the list is: " + result);
        }
    </script>
</head>
<body>
    <h2>Sum of Multiples of a or b in an Array</h2>
    <p>Enter the values of a, b, and the list (l), separated by commas.</p>
    
    <label for="a">a:</label>
    <input type="number" id="a"><br><br>

    <label for="b">b:</label>
    <input type="number" id="b"><br><br>

    <label for="l">l (list of numbers, separated by commas):</label>
    <input type="text" id="l"><br><br>

    <button onclick="onButtonClick()">Calculate Sum</button>
</body>
</html>
